function toMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
function minToTime(m){const r=m%(24*60);return`${String(Math.floor(r/60)).padStart(2,'0')}:${String(r%60).padStart(2,'0')}`;}

function getEffHourly(s, ds){
  if(!s.hourly||s.hourly<=0)return 0;
  if(s.hourly>15000)return s.hourly; // 프리미엄 시급은 그대로
  const year=String(ds||'').slice(0,4);
  const wages=db.settings.minWages||{'2025':10030,'2026':10320};
  return wages[year]||s.hourly;
}

function calcCost(s,e,hrly){
  // 야간할증 제외 - 기본시급만 적용
  if(!s||!e||!hrly)return{regHrs:0,nightHrs:0,totalHrs:0,cost:0};
  let sM=toMin(s),eM=toMin(e);if(eM<=sM)eM+=1440;
  const totalHrs=(eM-sM)/60;
  return{regHrs:totalHrs,nightHrs:0,totalHrs,cost:totalHrs*hrly};
}
function calcCostMins(sM,eM,hrly){return calcCost(minToTime(sM),minToTime(eM),hrly);}
function getEffEnd(sid,ds,orig){const day=db.days[ds];return(day&&day.earlyLeave&&day.earlyLeave[sid])||orig;}
function getEffStart(sid,ds,orig){const day=db.days[ds];return(day&&day.lateStart&&day.lateStart[sid])||orig;}

// ── CHECK-IN HELPERS ────────────────────────
function getCheckInInfo(s,ds){
  if(!s.checkInOnly)return null;
  if(s.status==='resigned'){
    // 고용기간(hireDate~resignDate) 밖이면 off
    const inPeriod=(!s.hireDate||ds>=s.hireDate)&&(!s.resignDate||ds<=s.resignDate);
    if(!inPeriod)return{type:'off'};
    // 기간 내: 정상 근무 처리로 계속
  }
  const d=new Date(ds+'T00:00:00'),dow=d.getDay();
  if(dow<2||dow>6)return{type:'off'};
  const day=db.days[ds],sh=day&&day.shifts&&day.shifts[s.id];
  if(!sh)return{type:'default'};
  if(sh.checkin===false)return{type:'absent'};
  if(sh.annual===true)return{type:'annual'};
  if(sh.start)return{type:'special',start:sh.start,end:sh.end};
  return{type:'default'};
}
function isCheckInWorking(s,ds){const ci=getCheckInInfo(s,ds);return ci&&ci.type!=='off'&&ci.type!=='absent';}

function getOperatingDaysInMonth(y,m){
  const owner=db.staff.find(s=>s.checkInOnly&&s.role==='대표');
  let count=0;const d=new Date(y,m,1);
  while(d.getMonth()===m){
    const dw=d.getDay();
    if(dw>=2&&dw<=6){
      const ds=toDS(d);
      if(owner){const day=db.days[ds];const sh=day&&day.shifts&&day.shifts[owner.id];if(sh&&sh.checkin===false){d.setDate(d.getDate()+1);continue;}}
      count++;
    }
    d.setDate(d.getDate()+1);
  }
  return count||1;
}
function getDailySalaryCost(s,ds){
  if(!s.monthlySalary||s.monthlySalary<=0)return 0;
  const ci=getCheckInInfo(s,ds);
  if(!ci||ci.type==='off'||ci.type==='absent')return 0;
  const d=new Date(ds+'T00:00:00');
  return s.monthlySalary/getOperatingDaysInMonth(d.getFullYear(),d.getMonth());
}

function dayLaborBreakdown(ds){
  const d=new Date(ds+'T00:00:00'),dw=d.getDay();
  if(dw<2||dw>6)return{partTimer:0,manager:0,total:0};
  const day=db.days[ds];
  let pt=0,mg=0;
  db.staff.filter(s=>!s.exclude).forEach(s=>{
    if(s.checkInOnly){mg+=getDailySalaryCost(s,ds);return;}
    const sh=day&&day.shifts&&day.shifts[s.id];
    if(!sh||sh.checkin)return;
    const effS=getEffStart(s.id,ds,sh.start);pt+=calcCost(effS,getEffEnd(s.id,ds,sh.end),getEffHourly(s,ds)).cost;
  });
  return{partTimer:pt,manager:mg,total:pt+mg};
}

function autoFillRevenues(dates){
  if(db.settings.autoFill===false)return;let changed=false;
  const todayDS=toDS(new Date());
  for(const d of dates){
    const ds=toDS(d),day=db.days[ds];
    const isActualEntered=(day?.actualRevenue||0)>0;
    const isManual=day?.revenue>0&&!day?.revAuto;
    // 실매출·수동입력 있으면 건드리지 않음
    if(isActualEntered||isManual)continue;
    // 오늘 포함 미래: 자동값 재계산
    if(ds>=todayDS&&(!day||!day.revenue||day.revAuto)){
      const auto=getAutoRevenue(ds);
      if(auto>0){ensureDay(ds).revenue=auto;ensureDay(ds).revAuto=true;changed=true;}
    } else if(ds<todayDS&&(!day||!day.revenue)){
      const auto=getAutoRevenue(ds);
      if(auto>0){ensureDay(ds).revenue=auto;ensureDay(ds).revAuto=true;changed=true;}
    }
  }
  if(changed)save();
}

    const isPast = ds < todayDS, isToday = ds === todayDS, isFuture = ds > todayDS;
    // 실매출 우선 → 수동입력 예상 → 자동(3주평균) → 없음
    const rev = day.actualRevenue > 0 ? day.actualRevenue
              : day.revenue > 0 ? day.revenue : 0;
    const isActual = day.actualRevenue > 0;
    // revAuto:true = autoFillRevenues가 채운 3주 평균 (예상)
    // revAuto:false + revenue>0 = 수동 입력 예상
    const isAutoFilled = !isActual && !!day.revAuto && day.revenue > 0;
    const isManualEst  = !isActual && !day.revAuto && day.revenue > 0;
    // 오늘·미래에서 표기 구분
    const isAuto = isAutoFilled && (isToday || isFuture);
    const isEst  = isManualEst  && (isToday || isFuture);
    const isFutureEst = (isAutoFilled || isManualEst) && isFuture;
    const lab = dayLaborElig(ds);
    let mgrCost = 0;
    db.staff.filter(s => s.checkInOnly && !s.exclude).forEach(s => { mgrCost += getDailySalaryCost(s, ds); });
    const ptCost = lab - mgrCost;
    const rate = rev > 0 ? lab / rev * 100 : null;
    const ok = rate !== null ? rate <= target * 100 : null;
    return { d, ds, dw: d.getDay(), rev, isActual, isEst, isFutureEst, isFuture, isPast, isToday, lab, mgrCost, ptCost, rate, ok };
  });

  // 월간 최고 인건비율 (그라데이션 기준)
  const monthRates=dayRows.filter(r=>r.rev>0&&r.lab>0).map(r=>r.lab/r.rev*100);
  const monthMaxRate=monthRates.length?Math.max(...monthRates):getTarget()*100+20;

  // ★ 누적: actualRevenue 또는 과거 수동입력(revAuto:false) 포함
  const pastRows = dayRows.filter(r => r.isPast || r.isToday);
  const enteredDays = pastRows.filter(r => {
    const d2 = db.days[r.ds] || {};
    if(d2.actualRevenue > 0) return true;             // 실매출 확정
    if(r.isPast && d2.revenue > 0 && !d2.revAuto) return true; // 과거 수동/시드
    return false;
  });
  const totalRev = enteredDays.reduce((t, r) => {
    const d2 = db.days[r.ds] || {};
    return t + (d2.actualRevenue || d2.revenue || 0);
  }, 0);
  const totalLab = pastRows.reduce((t, r) => t + r.lab, 0);
  const avgRate = totalRev > 0 ? totalLab / totalRev * 100 : 0;
  const avgDaily = enteredDays.length > 0 ? totalRev / enteredDays.length : 0;
  // 잔여 = 전체 영업일 중 아직 실매출 미입력인 날 (오늘 미입력도 포함)
  const remainDays = opDays.length - enteredDays.length;
  const projTotal = totalRev + avgDaily * remainDays;
  const monthGoal = getCurMonthGoal();

  // 카드
  document.getElementById('monthlyStatusCards').innerHTML = `
    <div class="card">
      <div class="card-label">영업 현황</div>

      <div class="card-sub">남은 영업일 ${remainDays}일 <span style="font-size:9px;color:var(--dim)">(미입력 포함)</span></div>
    </div>
    <div class="card">
      <div class="card-label">누적 매출 <span style="font-size:9px;color:var(--dim)">(과거+오늘)</span></div>
      <div class="card-value cv-neutral">${fmt(Math.round(totalRev))}원</div>
      <div class="card-sub">일 평균 ${fmt(Math.round(avgDaily))}원 · 예상 월말 ${fmt(Math.round(projTotal))}원</div>
    </div>
    <div class="card">
      <div class="card-label">누적 인건비</div>
      <div class="card-value ${totalRev > 0 ? (avgRate <= target * 100 ? 'cv-ok' : 'cv-over') : 'cv-neutral'}">${fmt(Math.round(totalLab))}원</div>
      <div class="card-sub">평균 인건비율 <strong>${totalRev > 0 ? avgRate.toFixed(1) + '%' : '—'}</strong> (목표 ${(target*100).toFixed(1)}%)</div>
    </div>
    <div class="card">
      <div class="card-label">월 목표 <button onclick="setMonthGoal()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px;padding:0 3px">✎</button></div>
      <div class="card-value ${monthGoal > 0 ? (totalRev >= monthGoal ? 'cv-ok' : 'cv-neutral') : 'cv-neutral'}">${monthGoal > 0 ? fmt(monthGoal) + '원' : '미설정'}</div>
      <div class="card-sub">${monthGoal > 0 ? `달성 ${Math.round(totalRev / monthGoal * 100)}% · 잔여 ${fmt(Math.max(0, monthGoal - totalRev))}원` : '<button onclick="setMonthGoal()" class="btn btn-ghost" style="padding:2px 8px;font-size:10px">설정하기</button>'}</div>
    </div>`;

  // 진행 바
  let progH = `<div class="progress-bar-wrap">`;
  if (monthGoal > 0) {
    const pct = Math.min(totalRev / monthGoal * 100, 100);
    const projPct = Math.min(projTotal / monthGoal * 100, 100);
    progH += `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
      <strong>매출 목표 진행률</strong>
      <span style="color:${pct>=100?'var(--green)':'var(--amber)'}"><strong>${pct.toFixed(1)}%</strong></span>
    </div>
    <div style="height:10px;background:var(--border);border-radius:5px;overflow:hidden;position:relative">
      <div style="position:absolute;height:100%;width:${projPct.toFixed(1)}%;background:rgba(212,168,67,.2);border-radius:5px"></div>
      <div style="position:absolute;height:100%;width:${pct.toFixed(1)}%;background:var(--amber);border-radius:5px;transition:width .4s"></div>
    </div>
    <div style="font-size:10px;color:var(--dim);display:flex;gap:14px;margin-top:4px">
      <span><span style="color:var(--amber)">■</span> 실적 ${fmt(Math.round(totalRev))}</span>
      <span style="opacity:.6"><span style="color:rgba(212,168,67,.4)">■</span> 예상 ${fmt(Math.round(projTotal))}</span>
      <span style="margin-left:auto">목표 ${fmt(monthGoal)}</span>

  } else {
    progH += `<div style="font-size:12px;color:var(--dim)">월 목표를 설정하면 진행률이 표시됩니다.

  if (totalRev > 0) {
    const rPct = Math.min(avgRate / (target * 100) * 100, 110);
    const isOk = avgRate <= target * 100;
    progH += `<div style="display:flex;justify-content:space-between;font-size:12px;margin-top:10px;margin-bottom:5px">

  document.getElementById('monthlyProgress').innerHTML = progH;

  // 주간 현황: 이번 주 전체 스케줄 + 매출 입력 + 시간 조정
  if(!window._weekSim) window._weekSim={};

  (function(){

    // 일별 데이터 (시뮬 반영)
    function simLabForDay(ds){
      let pt=0,mg=0;
      const d2=new Date(ds+'T00:00:00'),dw=d2.getDay();
      if(dw<2||dw>6)return{pt:0,mg:0,total:0};
      const dayObj=db.days[ds]||{};
      db.staff.filter(s=>!s.exclude).forEach(s=>{
        if(s.checkInOnly){mg+=getDailySalaryCost(s,ds);return;}
        const sh=dayObj.shifts&&dayObj.shifts[s.id];
        if(!sh||sh.checkin)return;
        const simKey=ds+'_'+s.id;
        const simEnd=window._weekSim[simKey]||(dayObj.earlyLeave&&dayObj.earlyLeave[s.id])||sh.end;
        const simStart=(window._weekSimStart&&window._weekSimStart[simKey])||(dayObj.lateStart&&dayObj.lateStart[s.id])||sh.start;
        pt+=calcCost(simStart,simEnd,getEffHourly(s,ds)).cost;
      });
      return{pt,mg,total:pt+mg};
    }

    const dayData=wDates.map((d,i)=>{
      const ds=toDS(d);
      const dayObj=db.days[ds]||{};
      const isPast=ds<todayDS,isToday=ds===todayDS,isFuture=ds>todayDS;
      const actRev=dayObj.actualRevenue||0;
      const manRev=!actRev&&!dayObj.revAuto&&dayObj.revenue>0?dayObj.revenue:0;
      const autoRev=!actRev&&!manRev?(dayObj.revenue||getAutoRevenue(ds)):0;
      const rev=actRev||manRev||autoRev;
      const isActual=!!actRev,isAutoFill=!actRev&&!manRev&&(!!dayObj.revAuto||(!dayObj.revenue&&autoRev>0));
      const lab=simLabForDay(ds);
      const rate=rev>0?lab.total/rev*100:null;
      const ok=rate!==null?rate<=tgt*100:null;
      return{d,ds,i,isPast,isToday,isFuture,rev,isActual,isAutoFill,lab,rate,ok};
    });

    // 테이블 HTML 생성
    let h=`<div class="chart-wrap" style="overflow-x:auto;padding:12px;margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div style="font-size:13px;font-weight:700;color:var(--amber)">📋 이번 주 현황 & 조정</div>
        <div style="font-size:11px;color:var(--dim)">목표 ${(tgt*100).toFixed(1)}% · 남은 영업일 조정 가능</div>
      </div>
      <table style="width:100%;border-collapse:collapse;min-width:480px;font-size:12px">
      <thead><tr>
        <th style="text-align:left;padding:6px 8px;color:var(--dim);border-bottom:1px solid var(--border);min-width:60px">직원</th>`;
    wDates.forEach((d,i)=>{
      const ds=toDS(d),isT=ds===todayDS,isP=ds<todayDS;
      h+=`<th style="padding:5px 4px;border-bottom:1px solid var(--border);text-align:center;min-width:68px;${isT?'background:rgba(212,168,67,.07)':''}">
        <div style="font-size:12px;font-weight:700;color:${isT?'var(--amber)':isP?'var(--dim)':'var(--text)'}">${d.getDate()}(${DAY_NAMES[i]})</div>
        ${isT?'<div style="font-size:9px;color:var(--amber)">TODAY</div>':''}
      </th>`;
    });
    h+=`</tr>
    <tr style="background:var(--amber-bg2)">
      <td style="padding:5px 8px;font-size:10px;color:var(--dim)">매출</td>`;
    dayData.forEach(dd=>{
      const rc=dd.isActual?'var(--amber)':dd.isAutoFill?'var(--night)':'var(--amber2)';
      h+=`<td style="padding:3px 3px;text-align:center;${dd.isToday?'background:rgba(212,168,67,.04)':''}">
        <input class="ms-rev-input" type="text"
          value="${dd.isActual?fmt(Math.round(db.days[dd.ds]?.actualRevenue||0)):''}"
          placeholder="${dd.rev>0?fmt(Math.round(dd.rev))+(dd.isAutoFill?' (예상)':' (예상)'):dd.isFuture||dd.isToday?'입력':'—'}"
          data-date="${dd.ds}" data-future="${dd.isFuture?'1':'0'}"
          onfocus="this.select()" onblur="saveMSActualRev(this,'${dd.ds}',${dd.isFuture})"
          onkeydown="if(event.key==='Enter')this.blur()"
          style="width:66px;color:${rc};text-align:center;font-size:11px">
      </td>`;
    });
    h+=`</tr></thead><tbody>`;

    // 직원 행
    schedStaff.forEach(s=>{
      h+=`<tr><td style="padding:5px 8px;font-weight:500;white-space:nowrap">
        <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${s.color};margin-right:4px;vertical-align:middle"></span>${s.name}
      </td>`;
      wDates.forEach((d,i)=>{
        const ds=toDS(d);
        const isPast=ds<todayDS,isToday=ds===todayDS,isFuture=ds>todayDS;
        const dayObj=db.days[ds]||{};
        if(s.checkInOnly){
          const ci=getCheckInInfo(s,ds);
          if(!ci||ci.type==='off')h+=`<td style="text-align:center;color:var(--border);padding:4px">—</td>`;
          else if(ci.type==='absent')h+=`<td style="text-align:center;color:var(--dim);padding:4px;font-size:11px">휴무</td>`;
          else h+=`<td style="text-align:center;padding:4px;${isToday?'background:rgba(212,168,67,.04)':''};"><span style="color:var(--green)">✓</span></td>`;
          return;
        }
        const sh=dayObj.shifts&&dayObj.shifts[s.id];
        if(!sh||sh.checkin){h+=`<td style="text-align:center;color:var(--border);padding:4px">—</td>`;return;}
        const simKey=ds+'_'+s.id;
        const earlyEnd=dayObj.earlyLeave&&dayObj.earlyLeave[s.id];
        const simEnd=(window._weekSim&&window._weekSim[simKey])||earlyEnd||sh.end;
        const effH=getEffHourly(s,ds);
        const cost=calcCost(sh.start,simEnd,effH).cost;
        const isAdj=(window._weekSim&&window._weekSim[simKey]!==undefined&&window._weekSim[simKey]!==sh.end)||(earlyEnd&&earlyEnd!==sh.end&&!(window._weekSim&&window._weekSim[simKey]!==undefined));

          // 출근/퇴근 시간 드롭다운 (최대 24:00, 익일 없음)
          const simStart=(window._weekSimStart&&window._weekSimStart[simKey])||getEffStart(s.id,ds,sh.start)||sh.start;
          const effStartForCalc=simStart;
          const costAdj=calcCost(effStartForCalc,simEnd,effH).cost;
          const isAdjStart=simStart!==sh.start;
          // 시간값 생성 헬퍼 (24:00 포함)
          const tToStr=t=>`${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
          let startOpts='',endOpts='';
          const origSM=toMin(sh.start);
          // 출근 드롭다운: 원래 출근 -60분 ~ 원래 출근 +120분 (최대 23:00)
          for(let t=Math.max(0,origSM-60);t<=Math.min(origSM+120,23*60);t+=15){
            const v=tToStr(t);
            startOpts+=`<option value="${v}"${simStart===v?' selected':''}>${v}</option>`;
          }
          // 퇴근 드롭다운: 원래 sh.start+30분 ~ 최대 24:00 (sh.end 항상 포함)
          const origEndSM=toMin(sh.end);
          const endStart=Math.min(origSM+30, toMin(effStartForCalc)+30); // 조정 출근에 의존 안 함
          const endEndMax=Math.max(Math.min(origSM+600,24*60), origEndSM);
          const endSet=new Set(); // 중복 방지
          for(let t=endStart;t<=endEndMax;t+=15) endSet.add(t);
          endSet.add(origEndSM); // sh.end 항상 포함
          [...endSet].sort((a,b)=>a-b).forEach(t=>{
            const v=tToStr(t);
            endOpts+=`<option value="${v}"${simEnd===v?' selected':''}>${v}</option>`;
          });
          const adjStyle=`border:1px solid var(--orange);color:var(--orange)`;
          const normStyle=`border:1px solid var(--border);color:var(--text)`;
          h+=`<td style="padding:3px 2px;text-align:center;${isToday?'background:rgba(212,168,67,.04)':''}">
            <div style="display:flex;gap:2px;justify-content:center;align-items:center">
              <select style="font-size:10px;padding:1px 1px;background:var(--s2);${isAdjStart?adjStyle:normStyle};border-radius:4px;width:50px;font-family:var(--font);cursor:pointer"
                onchange="updateWeekSimStart('${ds}','${s.id}',this.value)"
                title="출근 시간 조정">
                ${startOpts}
              </select>
              <span style="font-size:9px;color:var(--dim)">~</span>
              <select style="font-size:10px;padding:1px 1px;background:var(--s2);${isAdj?adjStyle:normStyle};border-radius:4px;width:50px;font-family:var(--font);cursor:pointer"
                onchange="updateWeekSim('${ds}','${s.id}',this.value)"
                title="퇴근 시간 조정">
                ${endOpts}
              </select>
              ${isAdj?`<div style="margin-top:3px;display:flex;gap:3px">
                <button onclick="updateWeekSimReason('${ds}','${s.id}','store')"
                  style="font-size:9px;padding:1px 4px;border-radius:3px;cursor:pointer;border:1px solid ${(window._weekSimReason&&window._weekSimReason['${ds}_${s.id}'])==='staff'?'var(--border)':'var(--night)'};background:${(window._weekSimReason&&window._weekSimReason['${ds}_${s.id}'])==='staff'?'none':'var(--night-bg)'};color:${(window._weekSimReason&&window._weekSimReason['${ds}_${s.id}'])==='staff'?'var(--dim)':'var(--night)'};font-family:var(--font)">매장</button>
                <button onclick="updateWeekSimReason('${ds}','${s.id}','staff')"
                  style="font-size:9px;padding:1px 4px;border-radius:3px;cursor:pointer;border:1px solid ${(window._weekSimReason&&window._weekSimReason['${ds}_${s.id}'])==='staff'?'var(--orange)':'var(--border)'};background:${(window._weekSimReason&&window._weekSimReason['${ds}_${s.id}'])==='staff'?'rgba(212,168,67,.1)':'none'};color:${(window._weekSimReason&&window._weekSimReason['${ds}_${s.id}'])==='staff'?'var(--orange)':'var(--dim)'};font-family:var(--font)">본인</button>
              </div>`:''}
            </div>
            <div style="font-size:10px;color:var(--amber)">${fmt(Math.round(costAdj))}</div>
          </td>`;

      h+=`</tr>`;
    });

    // 인건비 행
    h+=`<tr style="background:var(--s2)"><td style="padding:5px 8px;font-size:10px;color:var(--dim)">인건비</td>`;
    let wRev=0,wLab=0;
    dayData.forEach(dd=>{
      h+=`<td style="text-align:center;padding:5px 3px;font-size:11px;font-weight:600;color:var(--amber)">${dd.lab.total>0?fmt(Math.round(dd.lab.total)):'—'}</td>`;
      if(dd.rev>0)wRev+=dd.rev;
      wLab+=dd.lab.total;
    });
    h+=`</tr>`;
    // 비율 행
    h+=`<tr style="background:var(--s2)"><td style="padding:5px 8px;font-size:10px;color:var(--dim)">비율</td>`;
    dayData.forEach(dd=>{
      const rc=dd.ok===null?'var(--dim)':dd.ok?'var(--green)':'var(--red)';
      h+=`<td style="text-align:center;padding:5px 3px;font-size:11px;font-weight:700;color:${rc}">${dd.rate!==null?dd.rate.toFixed(1)+'%':'—'}</td>`;
    });
    h+=`</tr>`;
    // ── 파트 권고 행
    const _mgrSq=db.staff.find(s=>s.checkInOnly&&s.role==='점장');
    const _ptStaffQ=db.staff.filter(s=>!s.exclude&&!s.checkInOnly&&(s.status==='active'||!s.status)&&s.wage>0);
    const _avgWageQ=_ptStaffQ.length>0?_ptStaffQ.reduce((t,s)=>t+s.wage,0)/_ptStaffQ.length:13000;
    const _ptCostQ=Math.round(_avgWageQ*4);
    h+=`<tr style="border-top:2px solid var(--border2)"><td style="padding:5px 8px;font-size:10px;color:var(--dim)">파트권고</td>`;
    dayData.forEach(dd=>{
      const _rev=dd.rev||0;
      if(_rev===0){ h+=`<td style="text-align:center;padding:4px 2px;font-size:10px;color:var(--dim)">미입력</td>`; return; }
      const _mgrDq=_mgrSq&&_mgrSq.monthlySalary>0?Math.round(_mgrSq.monthlySalary/getOperatingDaysInMonth(year,month)):0;
      const _partBudQ=Math.round(_rev*tgt-_mgrDq);
      const _budRecQ=_partBudQ<_ptCostQ?0:_partBudQ<_ptCostQ*2?1:2;
      const _revCapQ=_rev<900000?0:_rev<1500000?1:2;
      const _recQ=Math.min(_budRecQ,_revCapQ);
      const _recColorQ=_recQ===0?'var(--red)':_recQ===1?'var(--night)':'var(--green)';
      const _recBgQ=_recQ===0?'rgba(212,88,88,.1)':_recQ===1?'rgba(100,160,255,.08)':'rgba(80,200,120,.1)';
      const _curPtQ=Object.entries(db.days[dd.ds]?.shifts||{}).filter(([sid,sh])=>{const s=db.staff.find(x=>x.id===sid);return s&&!s.exclude&&!s.checkInOnly&&sh&&!sh.off&&!sh.checkin;}).length;

function saveMSActualRev(input, ds, isFuture) {
  const val = parseInt(input.value.replace(/[^0-9]/g, '')) || 0;
  const day = ensureDay(ds);
  if (isFuture) {
    if (!val) {
      // 미래: 빈값이면 자동 예상으로 복원
      delete day.revenue;
      const auto = getAutoRevenue(ds);
      if (auto > 0) { day.revenue = auto; day.revAuto = true; }
      else day.revAuto = false;
    } else {
      day.revenue = val;
      day.revAuto = false;
    }
  } else {
    const todayDS3=toDS(new Date());
    // 오늘 또는 과거: 빈값이고 원래도 없던 날 → 무시 (placeholder 이탈)
    if (!val && !(db.days[ds]?.actualRevenue>0)) { return; }
    if (!val) {
      // 실매출 취소 → 3주 평균 예상으로 복원
      delete day.actualRevenue;
      const auto = getAutoRevenue(ds);
      if (auto > 0) { day.revenue = auto; day.revAuto = true; }
      else { day.revenue = 0; day.revAuto = false; }
    } else {
      day.actualRevenue = val;
      day.revenue = val;
      day.revAuto = false;
    }
  }
  input.value = val ? fmt(val) : '';
  save();
  refreshAllTabs();
}

function resetFutureEstimates(year, month) {
  if (!confirm('미래 날짜의 예상 매출을 초기화하고 3주 평균으로 재계산할까요?')) return;
  const todayDS = toDS(new Date());
  const opDays = getMonthlyStatusDays(year, month);
  for (const d of opDays) {
    const ds = toDS(d);
    if (ds <= todayDS) continue;
    if (db.days[ds]) {
      // 자동 계산 초기화
      delete db.days[ds].revenue;
      db.days[ds].revAuto = false;
    }
  }
  // 3주 평균 재계산 (autoFill)
  if (db.settings.autoFill) {
    for (const d of opDays) {
      const ds = toDS(d);
      if (ds <= todayDS) continue;
      const auto = getAutoRevenue(ds);
      if (auto > 0) {
        ensureDay(ds).revenue = auto;
        ensureDay(ds).revAuto = true;
      }
    }
  }
  save();
  renderMonthlyStatus();
  renderSchedule();
}

function calcMonthlyPTStats(year, month){
  const weeks=getMonthWeeks(year,month);
  const pts=db.staff.filter(s=>s.hourly>0&&!s.checkInOnly);
  let totalWage=0,totalHrs=0;
  for(const s of pts){
    for(const w of weeks){
      let wHrs=0;
      for(const d of w.allDates){
        const ds=toDS(d),day=db.days[ds],sh=day&&day.shifts&&day.shifts[s.id];
        if(!sh||sh.checkin)continue;
        const effEnd=getEffEnd(s.id,ds,sh.end),effStart=getEffStart(s.id,ds,sh.start),effH=getEffHourly(s,ds),c=calcCost(effStart,effEnd,effH);
        wHrs+=c.totalHrs;
        if(d.getMonth()===month&&d.getFullYear()===year){totalHrs+=c.totalHrs;totalWage+=c.cost;}
      }
    }
  }
  return{totalWage,totalHrs,effHourly:totalHrs>0?totalWage/totalHrs:0};
}

function renderSummaryChart(){
  const months=[];
  const refY=curSummaryMY.year,refM=curSummaryMY.month;
  const now=new Date();
  for(let i=5;i>=0;i--){
    const d=new Date(refY,refM-i,1);
    months.push({y:d.getFullYear(),m:d.getMonth(),label:`${d.getMonth()+1}월`});
  }
  const pts=db.staff.filter(s=>s.hourly>0&&!s.checkInOnly);
  const sortedPts=[...pts].sort((a,b)=>{
    if(a.hireDate&&b.hireDate)return a.hireDate.localeCompare(b.hireDate);
    return db.staff.indexOf(a)-db.staff.indexOf(b);
  });

  // 월별·직원별 근무시간 계산
  const monthData=months.map(({y,m,label})=>{
    const weeks=getMonthWeeks(y,m);
    const staffHrs={};let total=0;
    for(const s of sortedPts){
      let hrs=0;
      for(const w of weeks){
        for(const d of w.allDates){
          const ds=toDS(d),day=db.days[ds],sh=day&&day.shifts&&day.shifts[s.id];
          if(!sh||sh.checkin)continue;
          const effStart=getEffStart(s.id,ds,sh.start),effEnd=getEffEnd(s.id,ds,sh.end);
          hrs+=calcCost(effStart,effEnd,getEffHourly(s,ds)).totalHrs;
        }
      }
      staffHrs[s.id]=hrs;total+=hrs;
    }
    return{label,y,m,staffHrs,total};
  });

  const maxHrs=Math.max(...monthData.map(d=>d.total),1);
  if(!monthData.some(d=>d.total>0)){document.getElementById('summaryChart').innerHTML='';return;}

  const W=560,H=180,lPad=45,rPad=10,tPad=22,bPad=28;
  const iW=W-lPad-rPad,iH=H-tPad-bPad;
  const gap=iW/months.length;
  const barW=Math.floor(gap*0.65);
  const toY=v=>tPad+iH-(v/maxHrs)*iH;
  const toX=i=>lPad+gap*i+(gap-barW)/2;

  let svgBars='',svgLabels='',svgYAxis='';
  const maxTick=Math.ceil(maxHrs/10)*10;
  [maxTick*0.33,maxTick*0.67,maxTick].forEach(v=>{
    if(v<=0)return;
    const y=toY(v);
    svgYAxis+=`<text x="${lPad-4}" y="${y.toFixed(1)}" text-anchor="end" font-size="9" fill="var(--dim)" dominant-baseline="middle">${Math.round(v)}h</text>
<line x1="${lPad}" y1="${y.toFixed(1)}" x2="${W-rPad}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  });

  monthData.forEach((md,i)=>{
    const x=toX(i);
    const isNow=md.y===refY&&md.m===refM;
    const monthSorted=[...sortedPts].filter(s=>(md.staffHrs[s.id]||0)>0).sort((a,b)=>(md.staffHrs[b.id]||0)-(md.staffHrs[a.id]||0));
    let stackY=tPad+iH;
    monthSorted.forEach(s=>{
      const hrs=md.staffHrs[s.id]||0;if(hrs<=0)return;
      const barH=(hrs/maxHrs)*iH;stackY-=barH;

// ── 스케줄 직원 정렬: 체크인전용(대표·점장) → 파트타이머 입사순 ──
function getScheduleStaffOrder(){
  const fixed=db.staff.filter(s=>s.checkInOnly&&s.showInSchedule!==false&&s.status!=='resigned');
  const pts=db.staff.filter(s=>!s.checkInOnly&&s.showInSchedule!==false&&s.status!=='resigned');
  // hireDate 있으면 오름차순, 없으면 db 순서 유지
  pts.sort((a,b)=>{
    if(a.hireDate&&b.hireDate)return a.hireDate.localeCompare(b.hireDate);
    if(a.hireDate)return -1;
    if(b.hireDate)return 1;
    return db.staff.indexOf(a)-db.staff.indexOf(b);
  });
  return[...fixed,...pts];
}

// ── 인건비율 그라데이션 색상 ─────────────────
// target 이하: 초록
// target 초과: 노랑→주황→빨강 (월간 최고 기준)
function getRateColor(rate, maxRate){
  if(rate===null||rate===undefined)return 'var(--dim)';
  const tgt=getTarget()*100;
  if(rate<=tgt)return 'var(--green)';
  // 초과 범위
  const overRange=Math.max((maxRate||tgt+15)-tgt,5);
  const pos=Math.min((rate-tgt)/overRange,1); // 0~1
  // hsl: 50°(노랑) → 25°(주황) → 0°(빨강)
  const hue=Math.round(50*(1-pos));
  const sat=Math.round(88+12*(1-pos));
  const lit=Math.round(50-8*pos);
  return `hsl(${hue},${sat}%,${lit}%)`;
}

// 월별 최고/최저 인건비율 계산
function getMonthRateRange(year,month){
  const opDays=getMonthlyStatusDays(year,month);
  const rates=[];
  opDays.forEach(d=>{
    const ds=toDS(d),day=db.days[ds]||{};
    const rev=day.actualRevenue>0?day.actualRevenue:(day.revenue>0&&!day.revAuto?day.revenue:0);
    if(rev<=0)return;
    const lab=dayLaborElig(ds);
    if(lab>0)rates.push(lab/rev*100);
  });
  if(!rates.length)return{min:0,max:getTarget()*100+20};
  return{min:Math.min(...rates),max:Math.max(...rates)};
}

// ── 주간 목표 자동 분배 ─────────────────────
function getWeeklyTarget(){
  const goal=getCurMonthGoal();
  if(!goal)return null;
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const todayDS=toDS(now);
  const opDays=getMonthlyStatusDays(y,m);
  const entDays=opDays.filter(d=>{
    const day=db.days[toDS(d)]||{};
    return day.actualRevenue>0||(toDS(d)<todayDS&&day.revenue>0&&!day.revAuto);
  });
  const totalRev=entDays.reduce((t,d)=>{
    const day=db.days[toDS(d)]||{};
    return t+(day.actualRevenue||day.revenue||0);
  },0);
  const remainDays=opDays.length-entDays.length;
  const dailyTarget=remainDays>0?(goal-totalRev)/remainDays:0;
  const weekDates=getWeekDates(curWeekTue);
  const weekRemainDays=weekDates.filter(d=>toDS(d)>=todayDS).length;
  const weekTarget=Math.max(0,dailyTarget*weekRemainDays);
  return{goal,totalRev,remainDays,dailyTarget,weekTarget,weekRemainDays,achieved:totalRev>=goal};
}

// ── 전주 대비 비교 ───────────────────────────
function getPrevWeekStats(){
  const todayDS=toDS(new Date());
  const thisDates=getWeekDates(curWeekTue);
  // 이번 주 경과일 수 (오늘까지)
  const elapsedDates=thisDates.filter(d=>toDS(d)<=todayDS);
  const elapsedCount=Math.max(elapsedDates.length,1);

  const prevTue=new Date(curWeekTue);
  prevTue.setDate(prevTue.getDate()-7);
  const prevDates=getWeekDates(prevTue);
  // 전주에서 동일 경과일 수만큼만 비교
  const prevCompareDates=prevDates.slice(0,elapsedCount);
  let prevRev=0,prevLab=0;
  prevCompareDates.forEach(d=>{
    const ds=toDS(d),day=db.days[ds]||{};
    const r=day.actualRevenue>0?day.actualRevenue:(!day.revAuto&&day.revenue>0?day.revenue:0);
    prevRev+=r;
    prevLab+=dayLaborElig(ds);
  });
  return{prevRev,prevLab,prevDays:prevCompareDates.length,elapsedCount,prevRate:prevRev>0?prevLab/prevRev*100:null};
}

  [...months].reverse().forEach(({y,m})=>{
    const key = `${y}-${String(m+1).padStart(2,'0')}`;

function exportToExcel(selectedMonths){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const now=new Date();
  const fmtNum=v=>v||0;

  // ── 시트1: 일별 매출 현황 ──────────────────
  const sheet1Data=[['날짜','요일','매출(원)','확정여부','인건비(원)','인건비율(%)','메모']];
  const allDates=Object.keys(db.days).sort();
  const DOW=['일','월','화','수','목','금','토'];
  allDates.forEach(ds=>{
    const d=new Date(ds);
    if(d.getDay()===0||d.getDay()===1) return; // 일월 제외
    if(selectedMonths){const mk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;if(!selectedMonths.includes(mk))return;}
    const day=db.days[ds]||{};
    const rev=day.actualRevenue>0?day.actualRevenue:(!day.revAuto&&day.revenue>0?day.revenue:0);
    if(!rev) return;
    const lab=dayLaborElig(ds);
    const rate=rev>0?Math.round(lab/rev*1000)/10:0;
    const confirmed=day.actualRevenue>0?'확정':'예상';
    sheet1Data.push([ds,DOW[d.getDay()],rev,confirmed,Math.round(lab),rate,day.memo||'']);
  });
  const ws1=XLSX.utils.aoa_to_sheet(sheet1Data);
  ws1['!cols']=[{wch:12},{wch:6},{wch:14},{wch:8},{wch:14},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws1,'일별 매출');

  // ── 시트2: 주간 인건비 분석 ─────────────────
  // 최근 6개월 주간 데이터
  const sheet2Data=[['기간','예상매출(원)','파트인건비(원)','정직원인건비(원)','합계(원)','인건비율(%)','목표달성']];
  const _s2months=selectedMonths?selectedMonths.map(k=>{const[y,m]=k.split('-').map(Number);return{y,m:m-1};}).sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m):[...Array(6)].map((_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);return{y:d.getFullYear(),m:d.getMonth()};});
  for(const {y:_sy,m:_sm} of _s2months){
    const d=new Date(_sy,_sm,1);
    const weeks=getMonthWeeks(d.getFullYear(),d.getMonth());
    weeks.forEach(w=>{
      let rev=0,pt=0,mg=0;
      w.dates.forEach(wd=>{
        const ds=toDS(wd),day=db.days[ds]||{};
        rev+=(day.revenue||0);
        const b=dayLaborBreakdown(ds);pt+=b.partTimer;mg+=b.manager;
      });
      const total=pt+mg;
      const rate=rev>0?Math.round(total/rev*1000)/10:0;
      const f=w.dates[0],l=w.dates[w.dates.length-1];
      const lbl=`${f.getMonth()+1}/${f.getDate()}~${l.getMonth()+1}/${l.getDate()}`;
      const ok=rev>0?rate<=getTarget()*100?'달성':'초과':'';
      sheet2Data.push([lbl,fmtNum(rev),Math.round(pt),Math.round(mg),Math.round(total),rate,ok]);
    });
  }
  const ws2=XLSX.utils.aoa_to_sheet(sheet2Data);
  ws2['!cols']=[{wch:14},{wch:14},{wch:14},{wch:14},{wch:12},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws2,'주간 인건비');

  // ── 시트3: 직원별 월간 근무시간 ──────────────
  const months6=[];
  if(selectedMonths){
    selectedMonths.forEach(key=>{const[y,m]=key.split('-').map(Number);months6.push({y,m:m-1,label:key});});
    months6.sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m);
  } else {
    for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months6.push({y:d.getFullYear(),m:d.getMonth(),label:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});}
  }
  const ptStaff=db.staff.filter(s=>s.hourly>0&&!s.checkInOnly);
  const hdr3=['직원','입사일','상태',...months6.map(m=>m.label),'합계(시간)','합계(인건비)'];
  const sheet3Data=[hdr3];
  ptStaff.forEach(s=>{
    let totalHrs=0,totalCost=0;
    const row=[s.name,s.hireDate||'',s.status||'active'];
    months6.forEach(({y,m})=>{
      const weeks=getMonthWeeks(y,m);
      let hrs=0;
      weeks.forEach(w=>w.allDates.forEach(d=>{
        const ds=toDS(d),day=db.days[ds],sh=day&&day.shifts&&day.shifts[s.id];
        if(!sh)return;
        const es=getEffStart(s.id,ds,sh.start),ee=getEffEnd(s.id,ds,sh.end);
        hrs+=calcCost(es,ee,getEffHourly(s,ds)).totalHrs;
      }));
      row.push(Math.round(hrs*10)/10);
      totalHrs+=hrs;
      totalCost+=totalHrs*getEffHourly(s,toDS(new Date()));
    });
    row.push(Math.round(totalHrs*10)/10,Math.round(totalHrs*s.hourly));
    sheet3Data.push(row);
  });
  const ws3=XLSX.utils.aoa_to_sheet(sheet3Data);
  ws3['!cols']=[{wch:10},{wch:12},{wch:10},...months6.map(()=>({wch:12})),{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws3,'직원별 근무');

  // ── 시트4: 월별 손익 요약 ──────────────────
  const sheet4Data=[['월','영업일','매출합계(원)','일평균(원)','인건비합계(원)','인건비율(%)','목표달성']];
  const _s4months=selectedMonths?selectedMonths.map(k=>{const[y,m]=k.split('-').map(Number);return{y,m:m-1};}).sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m):[...Array(6)].map((_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);return{y:d.getFullYear(),m:d.getMonth()};});
  for(const {y:_s4y,m:_s4m} of _s4months){
    const d=new Date(_s4y,_s4m,1);
    const y=d.getFullYear(),m=d.getMonth();
    const opDays=getMonthlyStatusDays(y,m);
    let rev=0,lab=0,days=0;
    opDays.forEach(od=>{
      const ds=toDS(od),day=db.days[ds]||{};
      const r=day.actualRevenue>0?day.actualRevenue:(!day.revAuto&&day.revenue>0?day.revenue:0);
      if(r>0){rev+=r;days++;}
      lab+=dayLaborElig(ds);
    });
    const rate=rev>0?Math.round(lab/rev*1000)/10:0;
    const label=`${y}-${String(m+1).padStart(2,'0')}`;
    sheet4Data.push([label,days,rev,days>0?Math.round(rev/days):0,Math.round(lab),rate,rate>0?(rate<=getTarget()*100?'달성':'초과'):'']);
  }
  const ws4=XLSX.utils.aoa_to_sheet(sheet4Data);
  ws4['!cols']=[{wch:10},{wch:8},{wch:14},{wch:12},{wch:14},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws4,'월별 요약');

  // ── 시트5: 직원 정보 ──────────────────────
  const sheet5Data=[['이름','역할','시급/월급','입사일','상태','메모']];
  db.staff.forEach(s=>{
    const pay=s.checkInOnly?(s.monthlySalary||0)+'원/월':(s.hourly||0)+'원/시';
    const status={'active':'재직','joining':'입사예정','leaving':'퇴사예정','resigned':'퇴사'}[s.status]||s.status;
    sheet5Data.push([s.name,s.role||'',pay,s.hireDate||'',status,'']);
  });
  const ws5=XLSX.utils.aoa_to_sheet(sheet5Data);
  ws5['!cols']=[{wch:10},{wch:8},{wch:14},{wch:12},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws5,'직원 정보');

  // ── 시트6: 직원별 일별 근무 기록 ────────────
  const sheet6Data=[['날짜','요일','직원명','역할','예정출근','예정퇴근','실제출근','실제퇴근','근무시간(h)','인건비(원)','조기퇴근','조기퇴근사유','지각','메모']];
  const ptAndMgr=db.staff.filter(s=>!s.exclude&&s.status!=='resigned'||(s.resignDate&&new Date(s.resignDate)>new Date('2025-10-01')));
  const allDs6=Object.keys(db.days).filter(ds=>{const d=new Date(ds);return d.getDay()!==0&&d.getDay()!==1;}).sort();
  allDs6.forEach(ds=>{
    const d=new Date(ds);
    const day=db.days[ds]||{};
    const memo=day.memo||'';
    db.staff.forEach(s=>{
      if(s.checkInOnly) return; // 정직원 출퇴근 체크인만 있음 - 제외
      const sh=day.shifts&&day.shifts[s.id];
      if(!sh) return;
      const effStart=getEffStart(s.id,ds,sh.start);
      const effEnd=getEffEnd(s.id,ds,sh.end);
      const c=calcCost(effStart,effEnd,getEffHourly(s,ds));
      const hasEarly=effEnd!==sh.end;
      const hasLate=effStart!==sh.start;
      const earlyReason=hasEarly?((day.earlyLeaveReason&&day.earlyLeaveReason[s.id])==='staff'?'본인 요청':'매장 사정'):'';
      sheet6Data.push([
        ds,
        DOW[d.getDay()],
        s.name,
        s.role||'',
        sh.start,sh.end,
        effStart,effEnd,
        Math.round(c.totalHrs*10)/10,
        Math.round(c.cost),
        hasEarly?'O':'',
        earlyReason,
        hasLate?'O':'',
        memo
      ]);
    });
  });
  const ws6=XLSX.utils.aoa_to_sheet(sheet6Data);
  ws6['!cols']=[{wch:12},{wch:5},{wch:8},{wch:6},{wch:8},{wch:8},{wch:8},{wch:8},{wch:10},{wch:10},{wch:8},{wch:10},{wch:6},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws6,'직원별 일별 근무');

  // 파일 저장
  const filename=`yoshiya_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb,filename);
}

// ── GitHub Gist 백업 ──────────────────────────
const GIST_FILE = 'yoshiya-schedule-data.json';

function getGistConfig(){
  return{
    token: BACKUP_TOKEN || localStorage.getItem('yoshiya_gist_token')||'',
    gistId: BACKUP_GIST_ID || localStorage.getItem('yoshiya_gist_id')||''
  };
}

function setGistStatus(msg, color='var(--dim)'){
  const el=document.getElementById('gistStatus');
  if(el){el.textContent=msg;el.style.color=color;}
}

function openGistSettings(){
  const cfg=getGistConfig();
  document.getElementById('gistToken').value=cfg.token;
  document.getElementById('gistId').value=cfg.gistId;
  const row=document.getElementById('currentGistIdRow');
  const val=document.getElementById('currentGistIdVal');
  if(row&&val&&cfg.gistId){row.style.display='block';val.textContent=cfg.gistId;}
  document.getElementById('gistModal').classList.add('open');
}
function closeGistSettings(){
  document.getElementById('gistModal').classList.remove('open');
}
function saveGistSettings(){
  const token=document.getElementById('gistToken').value.trim();
  const gistId=document.getElementById('gistId').value.trim();
  if(!token){alert('토큰을 입력해주세요.');return;}
  localStorage.setItem('yoshiya_gist_token',token);
  localStorage.setItem('yoshiya_gist_id',gistId);
  closeGistSettings();
  setGistStatus('✅ 설정 저장됨','var(--green)');
  setTimeout(()=>setGistStatus(''),2000);
}

async function gistSave(silent=false){
  const {token,gistId}=getGistConfig();
  if(!token){openGistSettings();return;}
  if(!silent)setGistStatus('💾 저장 중...','var(--amber)');
  const payload={
    description:`よしや 야키니쿠 스케줄 데이터 (${new Date().toLocaleDateString('ko-KR')})`,
    public:false,
    files:{[GIST_FILE]:{content:JSON.stringify(db,null,2)}}
  };
  try{
    let res,data;
    if(gistId){
      res=await fetch(`https://api.github.com/gists/${gistId}`,{
        method:'PATCH',
        headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
    } else {
      res=await fetch('https://api.github.com/gists',{
        method:'POST',
        headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });
    }
    data=await res.json();
    if(data.id){
      localStorage.setItem('yoshiya_gist_id',data.id);
      const now=new Date();
      const timeStr=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
      // Gist ID를 data 안에도 저장
      db._gistId=data.id;
      localStorage.setItem('yoshiya7',JSON.stringify(db));
      localStorage.setItem('yoshiya_gist_id',data.id);
      // 첫 저장 시 ID 알림
      if(!silent&&!BACKUP_GIST_ID){
        setTimeout(()=>alert('✅ Gist ID (PC에 입력해주세요):\n\n'+data.id+'\n\n위 코드를 복사해서\n개발자에게 전달해주세요'),500);
      }
      if(silent){
        setGistStatus(`☁️ ${timeStr} 저장됨`,'var(--dim)');
      } else {
        setGistStatus(`✅ ${timeStr} 저장됨`,'var(--green)');
        setTimeout(()=>setGistStatus(`☁️ ${timeStr} 저장됨`,'var(--dim)'),2500);
      }
    } else {
      if(res.status===409||res.status===404){
        // 기존 Gist 무효 → 삭제 후 새로 생성
        localStorage.removeItem('yoshiya_gist_id');
        delete db._gistId;
        const newRes=await fetch('https://api.github.com/gists',{
          method:'POST',
          headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
          body:JSON.stringify(payload)
        });
        const newData=await newRes.json();
        if(newData.id){
          localStorage.setItem('yoshiya_gist_id',newData.id);
          db._gistId=newData.id;
          localStorage.setItem('yoshiya7',JSON.stringify(db));
          const now2=new Date();
          const ts=`${now2.getHours()}:${String(now2.getMinutes()).padStart(2,'0')}`;
          if(!silent)alert('✅ 새 Gist 생성됨\nID: '+newData.id+'\n\n이 ID를 메모해두세요');
          setGistStatus(`✅ ${ts} 저장됨`,'var(--green)');
          setTimeout(()=>setGistStatus(`☁️ ${ts} 저장됨`,'var(--dim)'),2500);
          return;
        }
        throw new Error('새 Gist 생성 실패: '+(newData.message||'unknown'));
      }
      throw new Error((data.message||'저장 실패')+' (status:'+res.status+')');
    }
  }catch(e){
    setGistStatus('❌ 저장 실패','var(--red)');
    alert('❌ 저장 실패\n\n'+e.message+'\n\n(이 메시지를 캡처해서 전달해주세요)');
  }
}

async function gistLoad(){
  const {token,gistId}=getGistConfig();
  if(!token||!gistId){
    if(!token) openGistSettings();
    else alert('저장된 Gist가 없습니다. 먼저 저장을 실행해주세요.');
    return;
  }
  setGistStatus('⬇️ 불러오는 중...','var(--amber)');
  try{
    const res=await fetch(`https://api.github.com/gists/${gistId}`,{
      headers:{'Authorization':`token ${token}`}
    });
    const data=await res.json();
    const fileContent=data.files?.[GIST_FILE]?.content;
    if(!fileContent) throw new Error('파일을 찾을 수 없습니다');
    const loaded=JSON.parse(fileContent);
    // db 업데이트 및 저장
    Object.assign(db,loaded);
    save();
    refreshAllTabs();
    setGistStatus('✅ 불러오기 완료','var(--green)');
    setTimeout(()=>setGistStatus(''),2500);
  }catch(e){
    setGistStatus('❌ 불러오기 실패','var(--red)');
    alert('불러오기 실패: '+e.message);
  }
}

async function captureScheduleScreenshot(){
  const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if(isMobile){showScreenshotGuide('schedule');return;}
  const btn=document.querySelector('[onclick*="captureScheduleScreenshot"]');
  if(btn)btn.textContent='⏳ 캡처 중...';
  await new Promise(r=>setTimeout(r,100));
  const el=document.getElementById('tab-schedule');
  if(!el){if(btn)btn.textContent='📸 공유';return;}
  const header=document.createElement('div');
  const lbl=weekLabel(curWeekTue);
  header.style.cssText='padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);margin-bottom:8px';
  header.innerHTML=`<div style="font-family:var(--serif);font-size:18px;color:var(--amber)">よしや 야키니쿠</div><div style="font-size:13px;color:var(--dim)">${lbl.main} · ${lbl.sub}</div>`;
  el.insertBefore(header,el.firstChild);
  try{
    const canvas=await html2canvas(el,{backgroundColor:'#0d0d18',scale:2,useCORS:true,logging:false});
    header.remove();
    canvas.toBlob(async blob=>{
      let copied=false;
      try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);copied=true;}catch(e){}
      if(copied){
        if(btn){btn.textContent='✅ 복사됨!';setTimeout(()=>{btn.textContent='📸 공유';},2500);}
        const toast=document.createElement('div');
        toast.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--amber);color:#0d0d18;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:700;z-index:9999;pointer-events:none;white-space:nowrap';
        toast.textContent='클립보드에 복사됐습니다 · 붙여넣기 하세요';
        document.body.appendChild(toast);setTimeout(()=>toast.remove(),2500);
      } else {
        showImageModal(canvas.toDataURL('image/png'),curWeekTue.getFullYear(),curWeekTue.getMonth());
      }
      if(btn)btn.textContent='📸 공유';
    },'image/png');
  }catch(e){header.remove();if(btn)btn.textContent='📸 공유';alert('캡처 실패: '+e.message);}
}

function copyScheduleShareText(btn){
  const dates=getWeekDates(curWeekTue);
  const lbl=weekLabel(curWeekTue);
  const staff=getScheduleStaffOrder();
  let text=`[よしや 야키니쿠] ${lbl.main}\n`;
  for(const s of staff){
    const parts=[];
    for(let i=0;i<dates.length;i++){
      const d=dates[i],ds=toDS(d),day=db.days[ds];
      if(s.checkInOnly){
        const ci=getCheckInInfo(s,ds);
        if(ci&&ci.type!=='off'&&ci.type!=='absent') parts.push(`${d.getDate()}(${DAY_NAMES[i]}) 출근`);
      } else {
        const sh=day&&day.shifts&&day.shifts[s.id];
        if(sh&&!sh.checkin){
          const es=getEffStart(s.id,ds,sh.start),ee=getEffEnd(s.id,ds,sh.end);
          parts.push(`${d.getDate()}(${DAY_NAMES[i]}) ${es}~${ee}`);
        }
      }
    }
    if(parts.length) text+=`${s.name}: ${parts.join(' / ')}\n`;
  }
  text+='\n※ 시간은 변경될 수 있습니다';
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='복사됨!';
    setTimeout(()=>{btn.textContent='텍스트 복사';},2000);
  }).catch(()=>alert(text));
}


function getAutoRevenue(ds){
  const d=new Date(ds+'T00:00:00');
  const weeks=db.settings.autoFillWeeks||3;
  const results=[];
  // 최대 8주까지 탐색해서 weeks개 데이터 수집
  for(let w=1;w<=8&&results.length<weeks;w++){
    const p=new Date(d);p.setDate(p.getDate()-w*7);
    const pDS=toDS(p),day=db.days[pDS];
    if(day&&(day.actualRevenue>0||(day.revenue>0&&!day.revAuto))){
      results.push(day.actualRevenue||day.revenue);
    }
  }
  return results.length>0?Math.round(results.reduce((a,b)=>a+b,0)/results.length):0;
}

// ── UTILS: MONTH WEEKS ──────────────────────
function getMonthWeeks(y,m){
  const lastDay=new Date(y,m+1,0);
  let tue=getWeekTue(new Date(y,m,1));
  const weeks=[];
  while(tue<=lastDay){
    const dates=getWeekDates(tue);
    const mDates=dates.filter(d=>d.getMonth()===m&&d.getFullYear()===y);
    if(mDates.length>0)weeks.push({tue:new Date(tue),dates:mDates,allDates:dates});
    tue=new Date(tue);tue.setDate(tue.getDate()+7);
  }
  return weeks;
}

// ── RENDER: MONTHLY ─────────────────────────
function renderMonthly(){
  const{year,month}=curMonthYear;
  document.getElementById('monthLabel').textContent=`${year}년 ${month+1}월`;
  const weeks=getMonthWeeks(year,month);
  const todayDS=toDS(new Date());
  const rows=weeks.map(w=>{
    let rev=0,ptCost=0,mgCost=0,opDays=0;
    const isFuture=w.dates.every(d=>toDS(d)>todayDS);
    const isPartial=!isFuture&&w.dates.some(d=>toDS(d)>=todayDS);
    for(const d of w.dates){
      const ds=toDS(d),day=db.days[ds]||{};
      // 월간현황과 동일한 기준: 확정 > 수동 > 자동
      const r=day.actualRevenue>0?day.actualRevenue:(day.revenue||0);
      rev+=r;
      const b=dayLaborBreakdown(ds);ptCost+=b.partTimer;mgCost+=b.manager;
      if(day.revenue)opDays++;
    }
    const total=ptCost+mgCost;
    const f=w.dates[0],l=w.dates[w.dates.length-1];
    const rate=rev>0?total/rev*100:null;
    return{lbl:`${f.getMonth()+1}/${f.getDate()}~${l.getMonth()+1}/${l.getDate()}`,rev,ptCost,mgCost,total,opDays,rate,ok:rate!==null?rate<=getTarget()*100:null,isFuture,isPartial};
  });
  const tR=rows.reduce((s,r)=>s+r.rev,0),tL=rows.reduce((s,r)=>s+r.total,0);
  const tPT=rows.reduce((s,r)=>s+r.ptCost,0),tMG=rows.reduce((s,r)=>s+r.mgCost,0);

  // ★ 프로젝션 계산: 확정 누계 + 일평균 × 잔여 영업일
  const todayDSm=toDS(new Date());
  const allOpDays=getMonthlyStatusDays(year,month);
  const pastOpDays=allOpDays.filter(d=>toDS(d)<=todayDSm);
  const futureOpDays=allOpDays.filter(d=>toDS(d)>todayDSm);
  // renderMonthlyStatus와 동일 기준: 오늘은 actualRevenue>0인 경우만 확정으로 처리
  const enteredRevDays=allOpDays.filter(d=>{
    const ds=toDS(d),day=db.days[ds]||{};
    return day.actualRevenue>0||(ds<todayDSm&&day.revenue>0&&!day.revAuto);
  });
  const enteredRevSum=enteredRevDays.reduce((t,d)=>{
    const day=db.days[toDS(d)]||{};
    return t+(day.actualRevenue||day.revenue||0);
  },0);
  const dailyAvg=enteredRevDays.length>0?enteredRevSum/enteredRevDays.length:0;
  const remainCount=allOpDays.length-enteredRevDays.length;
  const projRev=enteredRevSum+dailyAvg*remainCount;
  const projLabel=dailyAvg>0?`일평균 ${fmt(Math.round(dailyAvg))}원 · ${enteredRevDays.length}영업일 | 예상 ${fmt(Math.round(projRev))}원 (잔여 ${remainCount}일)`:fmt(tR)+'원';

  const dispRev=projRev>0?projRev:tR; // 카드 표시값
  const tRate=dispRev>0?tL/dispRev*100:0,tOk=tL<=dispRev*getTarget();
  const tGw=dispRev>0?Math.min(tL/(dispRev*getTarget())*100,100):0;
  document.getElementById('monthCards').innerHTML=`
    <div class="card"><div class="card-label">월 예상매출</div><div class="card-value cv-neutral">${fmt(Math.round(dispRev))}원</div><div class="card-sub" style="font-size:10px">${projLabel}</div></div>
    <div class="card"><div class="card-label">월 인건비</div><div class="card-value ${tR>0?(tOk?'cv-ok':'cv-over'):'cv-neutral'}">${fmt(Math.round(tL))}원</div><div class="gauge" style="margin-top:5px"><div class="gauge-fill" style="width:${tGw}%;background:${tR>0?(tOk?'var(--green)':'var(--red)'):'var(--dim)'}"></div></div></div>
    <div class="card"><div class="card-label">인건비율 <span style="color:var(--dim);font-size:10px">목표 ${db.settings.targetRate||18}%</span></div><div class="card-value ${tR>0?(tOk?'cv-ok':'cv-over'):'cv-neutral'}">${tR>0?tRate.toFixed(1)+'%':'—'}</div><div class="card-sub">${tR>0?(tOk?'<span style="color:var(--green)">✓ 달성</span>':'<span style="color:var(--red)">⚠ 초과</span>'):''}</div></div>`;
  // 차트
  const maxScale=Math.max(...rows.map(r=>Math.max(r.total,r.rev>0?r.rev*getTarget():0)),1);
  let chartH=`<div class="chart-wrap">
    <div class="chart-title">인건비 구성 비교 (주간별)</div>
    <div class="chart-legend">
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--teal)"></div>정직원 고정급</div>
      <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--amber)"></div>파트타이머</div>
      <div class="chart-legend-item"><div style="width:2px;height:14px;background:var(--red);border-radius:1px"></div>목표 기준선</div>
      ${tR>0?`<div class="chart-legend-item" style="margin-left:auto"><span style="font-size:10px;color:var(--dim)">파트: ${tPT>0?Math.round(tPT/tL*100):0}% · 점장: ${tMG>0?Math.round(tMG/tL*100):0}%</span></div>`:''}
    </div>`;
  for(const r of rows){
    if(r.total<=0&&!r.rev){chartH+=`<div class="chart-row"><div class="chart-label">${r.lbl}</div><div class="chart-bar"><div class="chart-bar-inner"></div></div><div class="chart-value" style="color:var(--dim)">—</div><div class="chart-pct"></div></div>`;continue;}
    const ptW=r.ptCost/maxScale*100,mgW=r.mgCost/maxScale*100;
    const budgetAmt=r.rev>0?r.rev*getTarget():0;
    const budgetPct=budgetAmt>0?Math.min(97,budgetAmt/maxScale*100):null;
    const isOver=r.total>budgetAmt&&budgetAmt>0;
    const rc=r.ok===null?'var(--dim)':r.ok?'var(--green)':'var(--red)';
    chartH+=`<div class="chart-row">
      <div class="chart-label">${r.lbl}</div>
      <div class="chart-bar" title="파트: ${fmt(Math.round(r.ptCost))}원 / 점장: ${fmt(Math.round(r.mgCost))}원">
        <div class="chart-bar-inner">
          <div class="chart-seg" style="width:${mgW.toFixed(1)}%;background:var(--teal)"></div>
          <div class="chart-seg" style="width:${ptW.toFixed(1)}%;background:var(--amber)"></div>
          ${isOver?`<div class="chart-seg" style="width:${Math.min(15,(r.total-budgetAmt)/maxScale*100).toFixed(1)}%;background:var(--red);opacity:.4"></div>`:''}
        </div>
        ${budgetPct!==null?`<div class="chart-budget-line" style="left:${budgetPct.toFixed(1)}%"></div>`:''}
      </div>
      <div class="chart-value" style="color:${isOver?'var(--red)':r.total>0?'var(--text)':'var(--dim)'}">${r.total>0?fmt(Math.round(r.total))+'원':'—'}</div>
      <div class="chart-pct" style="color:${rc}">${r.rate!==null?r.rate.toFixed(1)+'%':'—'}</div>
    </div>`;
  }
  if(tL>0){
    const ptWt=tPT/tL*100,mgWt=tMG/tL*100;
    const tBudget=tR>0?tR*getTarget():0,tBudgetPct=tBudget>0?Math.min(97,tBudget/tL*100*tL/Math.max(tL,tBudget)):null;
    chartH+=`<div class="chart-row" style="border-top:1px solid var(--border);margin-top:8px;padding-top:10px">
      <div class="chart-label" style="color:var(--amber);font-weight:700">월 합계</div>
      <div class="chart-bar">
        <div class="chart-bar-inner">
          <div class="chart-seg" style="width:${mgWt.toFixed(1)}%;background:var(--teal)"></div>
          <div class="chart-seg" style="width:${ptWt.toFixed(1)}%;background:var(--amber)"></div>
        </div>

      </div>
      <div class="chart-value" style="color:var(--amber);font-weight:700">${fmt(Math.round(tL))}원</div>
      <div class="chart-pct" style="color:${tOk?'var(--green)':'var(--red)'}">${tR>0?tRate.toFixed(1)+'%':'—'}</div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-top:8px;display:flex;gap:12px;flex-wrap:wrap">
      <span>파트 <strong style="color:var(--amber)">${fmt(Math.round(tPT))}원</strong></span>
      <span>정직원 <strong style="color:var(--teal)">${fmt(Math.round(tMG))}원</strong></span>
    </div>`;}
  chartH+=`</div>`;
  document.getElementById('laborChart').innerHTML=chartH;
  const tc=tR>0?(tOk?'var(--green)':'var(--red)'):'var(--dim)';
  let th=`<table class="tbl"><thead><tr><th>기간</th><th>예상매출</th><th>파트</th><th>정직원</th><th>합계</th><th>비율</th></tr></thead><tbody>`;
  for(const r of rows){
    const rc=r.ok===null?'var(--dim)':r.ok?'var(--green)':'var(--red)';

  }
  th+=`<tr class="tr-total"><td>월 합계</td><td>${fmt(tR)}</td><td style="color:var(--amber)">${fmt(Math.round(tPT))}</td><td style="color:var(--teal)">${fmt(Math.round(tMG))}</td><td>${fmt(Math.round(tL))}</td><td style="color:${tc}">${tR>0?tRate.toFixed(1)+'%':'—'}</td></tr>`;

function updateWeekSim(ds, sid, endTime){
  if(!window._weekSim) window._weekSim={};
  // 항상 저장 (earlyLeave 오버라이드 가능하도록 sh.end도 허용)
  window._weekSim[ds+'_'+sid]=endTime;
  renderMonthlyStatus();
}

function resetWeekSim(){
  // 현재 보고 있는 주 전체 earlyLeave/lateStart 초기화 (과거 주 포함)
  getWeekDates(curWeekTue).forEach(d=>{
    const ds=toDS(d);
    const day=db.days[ds];
    if(!day)return;
    day.earlyLeave={};
    day.lateStart={};
    day.earlyLeaveReason={};
  });
  window._weekSim={};
  window._weekSimStart={};
  window._weekSimReason={};
  save();
  refreshAllTabs();
}

function updateWeekSimStart(ds, sid, startTime){
  if(!window._weekSimStart) window._weekSimStart={};
  window._weekSimStart[ds+'_'+sid]=startTime;
  renderMonthlyStatus();
}

function applyWeekSim(){
  const hasEnd=window._weekSim&&Object.keys(window._weekSim).length;
  const hasStart=window._weekSimStart&&Object.keys(window._weekSimStart).length;
  if(!hasEnd&&!hasStart){alert('조정된 시간이 없습니다.');return;}
  let applied=0;
  // 퇴근 시간 적용 (sh.end와 같으면 earlyLeave 삭제 = 원래 복원)
  for(const[key,endTime] of Object.entries(window._weekSim||{})){
    const us=key.split('_'),ds=us[0],sid=us.slice(1).join('_');
    const day=ensureDay(ds);
    const sh=day.shifts&&day.shifts[sid];
    if(!sh)continue;
    if(!day.earlyLeave)day.earlyLeave={};
    if(!day.earlyLeaveReason)day.earlyLeaveReason={};
    if(endTime===sh.end){delete day.earlyLeave[sid];delete day.earlyLeaveReason[sid];}
    else{day.earlyLeave[sid]=endTime;day.earlyLeaveReason[sid]=(window._weekSimReason&&window._weekSimReason[ds+'_'+sid])||'store';}
    applied++;
  }
  // 출근 시간 적용 (sh.start와 같으면 lateStart 삭제)
  for(const[key,startTime] of Object.entries(window._weekSimStart||{})){
    const us=key.split('_'),ds=us[0],sid=us.slice(1).join('_');
    const day=ensureDay(ds);
    const sh=day.shifts&&day.shifts[sid];
    if(!sh)continue;
    if(!day.lateStart)day.lateStart={};
    if(startTime===sh.start){delete day.lateStart[sid];}
    else{day.lateStart[sid]=startTime;}
    applied++;
  }
  window._weekSim={};window._weekSimStart={};
  save();refreshAllTabs();
  if(applied>0)alert('✅ '+applied+'건 적용 완료\n스케줄 탭에도 반영됩니다.');
}

// ── 스케줄 탭 월간 요약바 ─────────────────────
function renderScheduleMonthSummary(){
  const el=document.getElementById('scheduleMonthSummary');
  if(!el)return;
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const todayDS=toDS(now);
  const opDays=getMonthlyStatusDays(y,m);

  // 확정 매출·인건비
  const entDays=opDays.filter(d=>{const day=db.days[toDS(d)]||{};return day.actualRevenue>0||(toDS(d)<todayDS&&day.revenue>0&&!day.revAuto);});
  const totalRev=entDays.reduce((t,d)=>{const day=db.days[toDS(d)]||{};return t+(day.actualRevenue||day.revenue||0);},0);
  let totalLab=0;
  opDays.forEach(d=>{const ds=toDS(d);if(ds>todayDS)return;const dObj=db.days[ds]||{};if(!(dObj.actualRevenue>0)&&ds===todayDS)return;totalLab+=dayLaborElig(ds);});
  const remain=opDays.length-entDays.length;
  const tgt=getTarget()*100;
  const rate=totalRev>0?totalLab/totalRev*100:null;
  const rateOk=rate!==null?rate<=tgt:null;
  const mBudget=totalRev*(tgt/100);
  const mHeadroom=mBudget-totalLab; // 양수=여유, 음수=초과

  // 점장 일할
  const _mgrS=db.staff.find(s=>s.checkInOnly&&s.role==='점장');
  const _mgrDaily=_mgrS&&_mgrS.monthlySalary>0?Math.round(_mgrS.monthlySalary/getOperatingDaysInMonth(y,m)):0;

  // 파트타이머 평균 시급 (active 파트만)
  const ptStaff=db.staff.filter(s=>!s.exclude&&!s.checkInOnly&&(s.status==='active'||!s.status)&&s.wage>0);
  const avgWage=ptStaff.length>0?ptStaff.reduce((t,s)=>t+s.wage,0)/ptStaff.length:13000;
  const avgShiftHrs=4; // 평균 시프트 시간
  const ptCostPerPerson=Math.round(avgWage*avgShiftHrs);

  // 이번 주 요일별 파트 배치 가이드
  const dates=getWeekDates(curWeekTue);
  const dayNames=['화','수','목','금','토'];
  const _aw2=db.settings.autoFillWeeks||3;
  const guideRows=dates.map((d,i)=>{
    const ds=toDS(d),day=db.days[ds]||{};
    const rev=day.actualRevenue>0?day.actualRevenue:(day.revenue||0);
    if(rev===0)return{day:dayNames[i],rev:0,partBudget:null,rec:null,noRev:true};
    const dayBudget=Math.round(rev*tgt/100);
    const partBudget=dayBudget-_mgrDaily;
    // 파트 권고: 목표 인건비율 기준 예산 + 매출 캡 동시 적용
    const budgetRec=partBudget===null?0:partBudget<ptCostPerPerson?0:partBudget<ptCostPerPerson*2?1:2;
    const revCap=rev<900000?0:rev<1500000?1:2;
    const rec=Math.min(budgetRec,revCap);
    return{day:dayNames[i],rev,dayBudget,partBudget,rec,noRev:false};
  });

  // ── 렌더링 ──────────────────────────────────
  const rateColor=rateOk===null?'var(--dim)':rateOk?'var(--green)':'var(--red)';
  const headroomColor=mHeadroom>=0?'var(--green)':'var(--red)';

  const guideHtml=guideRows.map(r=>{
    if(r.noRev)return '<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border2)">'
      +'<span style="font-size:11px;font-weight:700;color:var(--dim);width:16px">'+r.day+'</span>'
      +'<span style="font-size:11px;color:var(--dim)">매출 미입력</span>'
      +'</div>';
    const recColor=r.rec===0?'var(--dim)':r.rec===1?'var(--night)':'var(--green)';
    const recLabel=r.rec===0?'파트 0명':'파트 '+r.rec+'명';
    const warn=r.rec===0&&r.rev>0;
    return '<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border2)">'
      +'<span style="font-size:11px;font-weight:700;color:var(--text);width:16px">'+r.day+'</span>'
      +'<span style="font-size:11px;color:var(--dim);flex:1">'+fmt(r.rev)+'원</span>'
      +'<span style="font-size:11px;font-weight:700;color:'+recColor+'">'+recLabel+'</span>'
      +(warn?'<span style="font-size:10px;color:var(--red)">🚨불가</span>':'')
      +(r.partBudget>0?'<span style="font-size:10px;color:var(--dim)">여유 '+fmt(r.partBudget)+'원</span>':'')
      +'</div>';
  }).join('');

  const avgDay2=entDays.length>0?totalRev/entDays.length:0;
  const proj=Math.round(totalRev+avgDay2*remain);
  const overPct=rate!==null&&rate>tgt?Math.round((rate-tgt)*10)/10:null;

  el.innerHTML='<div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px">'
    +'<div style="display:grid;grid-template-columns:1fr auto;gap:3px 10px;margin-bottom:10px;align-items:center">'
    +'<div style="display:flex;align-items:baseline;gap:6px">'
    +'<span style="font-size:10px;color:var(--dim)">'+y+'년 '+(m+1)+'월 '+entDays.length+'일 누적</span>'
    +'<span style="font-size:13px;font-weight:800;color:var(--amber)">'+fmt(Math.round(totalRev))+'원</span>'
    +'</div>'
    +'<div style="display:flex;align-items:baseline;gap:5px;justify-content:flex-end">'
    +'<span style="font-size:12px;font-weight:800;color:'+rateColor+'">인건비율 '+(rate!==null?rate.toFixed(1)+'%':'—')+'</span>'
    +'<span style="font-size:11px;font-weight:700;color:'+headroomColor+'">'+(mHeadroom>=0?'여유':'초과')+' '+fmt(Math.round(Math.abs(mHeadroom)))+'원</span>'
    +'</div>'
    +'<div style="display:flex;align-items:baseline;gap:6px">'
    +'<span style="font-size:10px;color:var(--dim)">월 예상매출</span>'
    +'<span style="font-size:12px;font-weight:600;color:var(--dim)">'+fmt(proj)+'원</span>'
    +'<span style="font-size:10px;color:var(--dim)">잔여 '+remain+'일</span>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:4px;justify-content:flex-end">'
    +'<span style="font-size:10px;color:var(--dim)">목표</span>'
    +'<div style="display:flex;align-items:center">'
    +'<button ontouchstart="event.preventDefault();_tgtStep(-0.5)" onclick="_tgtStep(-0.5)" style="width:24px;height:24px;border-radius:5px 0 0 5px;border:1px solid var(--border);border-right:none;background:var(--s2);color:var(--amber);font-size:16px;font-family:var(--font);cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent">−</button>'
    +'<div id="tgtRateVal" ontouchstart="_tgtDragStart(event)" ontouchmove="_tgtDragMove(event)" ontouchend="_tgtDragEnd()" onmousedown="_tgtDragStart(event)" style="min-width:46px;height:24px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--amber);cursor:ew-resize;font-family:var(--font);touch-action:none">'+tgt.toFixed(1)+'%</div>'
    +'<button ontouchstart="event.preventDefault();_tgtStep(0.5)" onclick="_tgtStep(0.5)" style="width:24px;height:24px;border-radius:0 5px 5px 0;border:1px solid var(--border);border-left:none;background:var(--s2);color:var(--amber);font-size:16px;font-family:var(--font);cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent">+</button>'
    +'</div>'
    +(overPct!==null?'<span style="font-size:10px;color:var(--red);font-weight:700">+'+overPct.toFixed(1)+'%p</span>':'<span style="font-size:10px;color:var(--green)">✅</span>')
    +'</div>'
    +'</div>'
    // ── 하단: 이번 주 파트 배치 가이드
    +'<div style="border-top:1px solid var(--border);padding-top:8px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
    +'<span style="font-size:10px;color:var(--dim);font-weight:600">이번 주 파트 배치 가이드</span>'
    +'<select onchange="changeAutoFillWeeks(this.value)" style="font-size:10px;padding:2px 5px;background:var(--s2);border:1px solid var(--border);border-radius:5px;color:var(--night);font-family:var(--font);cursor:pointer;outline:none">'
    +'<option value="1" '+((_aw2===1)?'selected':'')+'>1주 평균</option>'
    +'<option value="2" '+((_aw2===2)?'selected':'')+'>2주 평균</option>'
    +'<option value="3" '+((_aw2===3)?'selected':'')+'>3주 평균</option>'
    +'<option value="4" '+((_aw2===4)?'selected':'')+'>4주 평균</option>'
    +'</select>'
    +'<span style="font-size:10px;color:var(--dim);font-weight:400">('+Math.round(avgShiftHrs)+'h · 시급 '+fmt(Math.round(avgWage))+'원 · 목표 '+tgt.toFixed(1)+'% 기준)</span>'
    +'</div>'
    +guideHtml
    +'</div>'
    +'</div>';
}

function resetActualRev(ds) {
  const day = db.days[ds];
  if (!day) return;
  // 실매출 삭제 → 3주 평균 복원
  delete day.actualRevenue;
  const auto = getAutoRevenue(ds);
  if (auto > 0) { day.revenue = auto; day.revAuto = true; }
  else { day.revenue = 0; day.revAuto = false; }
  save();
  refreshAllTabs();
}

function changeAutoFillWeeks(v){
  db.settings.autoFillWeeks=parseInt(v)||3;
  // 주수 변경 시 미래 모든 자동/수동 예상값 재계산 (실매출 제외)
  {
    const todayDS=toDS(new Date());
    // 오늘 포함 미래 예상값 전체 초기화 (실매출 제외)
    for(const ds in db.days){
      if(ds>=todayDS&&!(db.days[ds].actualRevenue>0)){
        // 자동값 또는 수동 예상값 모두 초기화
        delete db.days[ds].revenue;
        db.days[ds].revAuto=false;
      }
    }
    // 오늘~향후 8주 전체 재계산 (화요일 포함 모든 요일)
    const weekStart=getWeekTue(new Date());
    for(let w=0;w<9;w++){
      const wt=new Date(weekStart);wt.setDate(wt.getDate()+w*7);
      getWeekDates(wt).forEach(d=>{
        const ds=toDS(d);
        if(ds<todayDS)return;
        const dayObj=db.days[ds]||{};
        if(dayObj.actualRevenue>0||(dayObj.revenue>0&&!dayObj.revAuto))return;
        const auto=getAutoRevenue(ds);
        if(auto>0){ensureDay(ds).revenue=auto;ensureDay(ds).revAuto=true;}
      });
    }
  }
  save();
  renderSchedule();
}

// ── RENDER: REVENUE CHART ───────────────────
let curRevenueOffset = 0; // 0=최근6개월, -1=6~12개월 전 등
let curRevenueFilter = new Set(); // 빈 Set=전체, 값 있으면 선택된 월만

// ── AI 스케줄 평가 ───────────────────────────

function toggleRevenueMonth(key){
  if(curRevenueFilter.has(key)) curRevenueFilter.delete(key);
  else curRevenueFilter.add(key);
  renderRevenue();
}
function selectAllRevenueMonths(){
  curRevenueFilter=new Set();
  renderRevenue();
}

function changeRevenueRange(d){
  curRevenueOffset+=d;
  renderRevenue();
}

function renderRevenue(){
  const now=new Date();
  // 전체 데이터 기간 (영업 시작 ~ 현재)
  const allMonths=[];
  const openDate=new Date('2025-11-01');
  for(let d=new Date(openDate.getFullYear(),openDate.getMonth(),1);
      d<=new Date(now.getFullYear(),now.getMonth(),1);
      d.setMonth(d.getMonth()+1)){
    allMonths.push({y:d.getFullYear(),m:d.getMonth()});
  }

  // 월 칩 렌더링
  const chipsEl=document.getElementById('revenueMonthChips');
  if(chipsEl){
    const isAll=curRevenueFilter.size===0;
    let chips=`<button onclick="selectAllRevenueMonths()" style="padding:5px 12px;border-radius:16px;font-size:12px;font-family:var(--font);cursor:pointer;font-weight:600;border:1.5px solid ${isAll?'var(--amber)':'var(--border)'};background:${isAll?'var(--amber)':'transparent'};color:${isAll?'#0d0d18':'var(--dim)'}">전체</button>`;
    [...allMonths].reverse().forEach(({y,m})=>{
      const key=`${y}-${String(m+1).padStart(2,'0')}`;
      const active=curRevenueFilter.has(key);
      chips+=`<button onclick="toggleRevenueMonth('${key}')" style="padding:5px 12px;border-radius:16px;font-size:12px;font-family:var(--font);cursor:pointer;border:1.5px solid ${active?'var(--amber)':'var(--border)'};background:${active?'rgba(212,168,67,.15)':'transparent'};color:${active?'var(--amber)':'var(--dim)'}">${m+1}월</button>`;
    });
    chipsEl.innerHTML=chips;
  }

  // 표시할 months 결정
  let months=[];
  if(curRevenueFilter.size>0){
    // 선택된 월만 (오래된 순)
    [...allMonths].filter(({y,m})=>curRevenueFilter.has(`${y}-${String(m+1).padStart(2,'0')}`))
      .forEach(mo=>months.push(mo));
  } else {
    // 전체: 전체 기간 표시
    allMonths.forEach(mo=>months.push(mo));
  }

  const tgt=getTarget()*100;

  const mData=months.map(({y,m})=>{
    const opDays=getMonthlyStatusDays(y,m);
    // 실매출 합계 (actualRevenue + 수동입력 revenue)
    let rev=0,revDays=0;
    opDays.forEach(d=>{
      const ds=toDS(d),day=db.days[ds]||{};
      const r=day.actualRevenue>0?day.actualRevenue:(!day.revAuto&&day.revenue>0?day.revenue:0);
      if(r>0){rev+=r;revDays++;}
    });
    // 인건비 (확정일만)
    const todayDS2=toDS(new Date());
    let lab=0;
    opDays.forEach(d=>{
      const ds=toDS(d);
      if(ds>todayDS2)return;
      const day=db.days[ds]||{};
      const r=day.actualRevenue>0?day.actualRevenue:(!day.revAuto&&day.revenue>0?day.revenue:0);
      if(r>0)lab+=dayLaborElig(ds);
    });
    const rate=rev>0?lab/rev*100:null;
    const ok=rate!==null?rate<=tgt:null;
    return{label:`${m+1}월`,y,m,rev,lab,rate,ok,revDays};
  });

  const maxRev=Math.max(...mData.map(d=>d.rev),1);
  const W=580,H=220,lPad=55,rPad=55,tPad=25,bPad=32;
  const iW=W-lPad-rPad,iH=H-tPad-bPad;
  const gap=iW/mData.length;
  const barW=Math.floor(gap*0.6);
  const toX=i=>lPad+gap*i+(gap-barW)/2;
  const toY=v=>tPad+iH-(v/maxRev)*iH;

  let svgBars='',svgLine='',svgDots='',svgAxis='',svgRateAxis='';

  // Y축 왼쪽 (매출)
  [0.25,0.5,0.75,1].forEach(p=>{
    const v=maxRev*p;
    const y=toY(v);
    svgAxis+=`<text x="${lPad-6}" y="${y.toFixed(1)}" text-anchor="end" font-size="9" fill="var(--dim)" dominant-baseline="middle">${Math.round(v/10000)}만</text>
<line x1="${lPad}" y1="${y.toFixed(1)}" x2="${W-rPad}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  });

  // 목표 인건비율 기준선 (오른쪽 축)
  const rateToY=r=>tPad+iH-(r/50)*iH; // 0~50% 범위
  [0,tgt,30,50].forEach(r=>{
    const y=rateToY(r);
    if(y<tPad||y>tPad+iH)return;
    const isTgt=r===tgt;
    svgRateAxis+=`<text x="${W-rPad+5}" y="${y.toFixed(1)}" text-anchor="start" font-size="9" fill="${isTgt?'var(--amber)':'var(--dim)'}" dominant-baseline="middle">${r}%</text>`;
    if(isTgt){
      svgRateAxis+=`<line x1="${lPad}" y1="${y.toFixed(1)}" x2="${W-rPad}" y2="${y.toFixed(1)}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="5,4" opacity=".5"/>`;
    }
  });

  // 막대 + 인건비율 꺾은선
  const linePoints=[];
  mData.forEach((md,i)=>{
    const x=toX(i),cx=x+barW/2;
    const isNow=md.y===now.getFullYear()&&md.m===now.getMonth();
    // 매출 막대
    if(md.rev>0){
      const barH=(md.rev/maxRev)*iH;
      const barY=tPad+iH-barH;
      const barColor=md.ok===null?'var(--dim)':md.ok?'var(--green)':'var(--red)';
      svgBars+=`<rect x="${x}" y="${barY.toFixed(1)}" width="${barW}" height="${barH.toFixed(1)}"
        fill="${barColor}" opacity="${isNow?'0.95':'0.75'}" rx="3"/>`;
      // 매출 값
      svgBars+=`<text x="${cx.toFixed(1)}" y="${(barY-6).toFixed(1)}" text-anchor="middle" font-size="9" fill="var(--text)" font-weight="${isNow?700:400}">${Math.round(md.rev/10000)}만</text>`;
    }

    // 인건비율 점 좌표
    if(md.rate!==null){
      const ry=rateToY(md.rate);
      linePoints.push({x:cx,y:ry,rate:md.rate,ok:md.ok});
    } else {
      linePoints.push(null);
    }

    // 월 레이블
    svgBars+=`<text x="${cx.toFixed(1)}" y="${(H-bPad+14).toFixed(1)}" text-anchor="middle" font-size="${isNow?11:10}" font-weight="${isNow?700:400}" fill="${isNow?'var(--amber)':'var(--dim)'}">${md.label}</text>`;
  });

  // 인건비율 꺾은선 그리기 (M/L 올바르게 처리)
  let pathD='';
  linePoints.forEach((pt,i)=>{
    if(!pt){return;}
    // 직전에 유효한 점이 있으면 L, 없으면 M (선 새로 시작)
    const prevHasPoint=i>0&&linePoints[i-1]!==null;
    pathD+=(prevHasPoint?'L':'M')+`${pt.x.toFixed(1)},${pt.y.toFixed(1)} `;
  });
  if(pathD)svgLine=`<path d="${pathD}" fill="none" stroke="rgba(212,168,67,0.9)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  linePoints.forEach(pt=>{
    if(!pt)return;
    const c=pt.ok===null?'var(--dim)':pt.ok?'var(--green)':getRateColor(pt.rate,Math.max(...linePoints.filter(Boolean).map(p=>p.rate)));
    svgDots+=`<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="4" fill="${c}" stroke="var(--s1)" stroke-width="2"/>
    <text x="${pt.x.toFixed(1)}" y="${(pt.y-10).toFixed(1)}" text-anchor="middle" font-size="9" fill="${c}" font-weight="600">${pt.rate.toFixed(1)}%</text>`;
  });

  // 범례
  const legend=`<div class="chart-legend" style="margin-bottom:8px">
    <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--green)"></div>매출 (목표달성)</div>
    <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--red)"></div>매출 (목표초과)</div>
    <div class="chart-legend-item"><div style="width:20px;height:2px;background:rgba(212,168,67,.8);border-radius:1px"></div>인건비율 ●</div>
    <div class="chart-legend-item" style="margin-left:auto"><span style="color:var(--amber);font-size:10px">—— 목표 ${tgt.toFixed(1)}%</span></div>
  </div>`;

  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;overflow:visible">
    ${svgAxis}${svgRateAxis}
    ${svgBars}${svgLine}${svgDots}
    <text x="${lPad-6}" y="${tPad-10}" text-anchor="end" font-size="9" fill="var(--dim)">매출</text>
    <text x="${W-rPad+5}" y="${tPad-10}" font-size="9" fill="var(--dim)">인건비율</text>
  </svg>`;

  document.getElementById('revenueChart').innerHTML=`<div class="chart-wrap">
    <div class="chart-title">월간 매출 & 인건비율
      <span style="font-size:10px;color:var(--dim);font-weight:400;margin-left:6px">막대=매출(색상=인건비율 달성여부) · 선=인건비율%</span>
    </div>
    ${legend}${svg}
  </div>`;

  // ── 요일별 평균 매출 ──────────────────────
  const DOW_NAMES=['화','수','목','금','토'];
  const DOW_VALS=[2,3,4,5,6];
  const dowAvgs=DOW_VALS.map(dw=>{
    const vals=[];
    mData.forEach(md=>{
      const opDays2=getMonthlyStatusDays(md.y,md.m);
      opDays2.filter(d=>d.getDay()===dw).forEach(d=>{
        const ds=toDS(d),day=db.days[ds]||{};
        const r=day.actualRevenue>0?day.actualRevenue:(!day.revAuto&&day.revenue>0?day.revenue:0);
        if(r>0)vals.push(r);
      });
    });
    return{dw,name:DOW_NAMES[DOW_VALS.indexOf(dw)],avg:vals.length>0?Math.round(vals.reduce((a,b)=>a+b)/vals.length):0,count:vals.length};
  });
  const maxDowAvg=Math.max(...dowAvgs.map(d=>d.avg),1);

// ── 미래 자동채움 전체 재계산 ─────────────────
function recalcFutureAutoFills(){
  const todayDS=toDS(new Date());
  // 오늘 이후 revAuto=true 값 초기화
  for(const ds in db.days){
    if(ds>=todayDS&&db.days[ds].revAuto){
      delete db.days[ds].revenue;
      db.days[ds].revAuto=false;
    }
  }
  // 향후 8주 재계산
  const weekStart=getWeekTue(new Date());
  for(let w=0;w<9;w++){
    const wt=new Date(weekStart);wt.setDate(wt.getDate()+w*7);
    getWeekDates(wt).forEach(d=>{
      const ds=toDS(d);
      if(ds<todayDS)return;
      const dayObj=db.days[ds]||{};
      if(dayObj.actualRevenue>0||(dayObj.revenue>0&&!dayObj.revAuto))return;
      const auto=getAutoRevenue(ds);
      if(auto>0){ensureDay(ds).revenue=auto;ensureDay(ds).revAuto=true;}
    });
  }
}


function saveRevenueToday(input, ds){
  const val=parseInt(input.value.replace(/[^0-9]/g,''))||0;
  const day=ensureDay(ds);
  const isAct=day.actualRevenue>0; // 현재 실제 모드?
  if(!val&&!(day.revenue>0)&&!(day.actualRevenue>0)){return;}
  if(isAct){
    // 실제 모드: actualRevenue 업데이트
    if(val) { day.actualRevenue=val; day.revenue=val; day.revAuto=false; }
    else { delete day.actualRevenue; }
    recalcFutureAutoFills(); // 실매출 확정 → 평균 재계산
  } else {
    // 예상 모드: revenue 업데이트
    if(val) { day.revenue=val; day.revAuto=false; }
    else { delete day.revenue; day.revAuto=false; }
  }
  input.value=val?fmt(val):'';
  save(); refreshAllTabs();
}

function setTodayRevType(ds, type){
  const day=ensureDay(ds);
  const curVal=day.actualRevenue||day.revenue||0;
  if(type==='act'){
    // 예상 → 실제 전환
    if(curVal>0){ day.actualRevenue=curVal; day.revenue=curVal; day.revAuto=false; recalcFutureAutoFills(); }
  } else {
    // 실제 → 예상 전환
    delete day.actualRevenue;
    if(curVal>0){ day.revenue=curVal; day.revAuto=false; }
    else {
      const auto=getAutoRevenue(ds);
      if(auto>0){ day.revenue=auto; day.revAuto=true; }
    }
  }
  save(); refreshAllTabs();
}

let _tgtDragX=null,_tgtDragVal=null;
function _tgtStep(delta){
  const cur=db.settings.targetRate||18;
  const next=Math.round((cur+delta)*10)/10;
  if(next<5||next>50)return;
  saveInlineTargetRate(next);
}
function _tgtDragStart(e){
  _tgtDragX=(e.touches?e.touches[0]:e).clientX;
  _tgtDragVal=db.settings.targetRate||18;
  e.preventDefault();
}
function _tgtDragMove(e){
  if(_tgtDragX===null)return;
  const x=(e.touches?e.touches[0]:e).clientX;
  const delta=Math.round((x-_tgtDragX)/8)*0.5; // 8px당 0.5%
  const next=Math.round((_tgtDragVal+delta)*10)/10;
  if(next<5||next>50)return;
  const el=document.getElementById('tgtRateVal');
  if(el)el.textContent=next.toFixed(1)+'%';
  e.preventDefault();
}
function _tgtDragEnd(){
  if(_tgtDragX===null)return;
  const el=document.getElementById('tgtRateVal');
  if(el){
    const val=parseFloat(el.textContent);
    if(!isNaN(val))saveInlineTargetRate(val);
  }
  _tgtDragX=null;_tgtDragVal=null;
}


function saveInlineTargetRate(v){
  const val=parseFloat(v);
  if(isNaN(val)||val<5||val>50)return;
  db.settings.targetRate=val;
  save();
  refreshAllTabs();
}

  }

function closeShiftModal(){document.getElementById('shiftModal').classList.remove('open');editShift=null;}
function saveShift(){
  if(!editShift)return;
  const s=db.staff.find(x=>x.id===editShift.staffId);
  const day=ensureDay(editShift.ds);
  if(s.checkInOnly){
    const mode=document.querySelector('input[name="ciMode"]:checked')?.value||'default';
    if(mode==='default')delete day.shifts[editShift.staffId];
    else if(mode==='absent')day.shifts[editShift.staffId]={checkin:false};
    else if(mode==='annual')day.shifts[editShift.staffId]={annual:true};
    else day.shifts[editShift.staffId]={start:document.getElementById('shiftStart').value,end:document.getElementById('shiftEnd').value};
  } else {
    const st=document.getElementById('shiftStart').value;
    const en=document.getElementById('shiftEnd').value;
    day.shifts[editShift.staffId]={start:st,end:en};
    // 마지막 입력 시간 기억
    window._lastShiftStart=st;
    window._lastShiftEnd=en;
  }
  save();closeShiftModal();
  refreshAllTabs();
}
function clearShift(){if(!editShift)return;const day=db.days[editShift.ds];if(day&&day.shifts)delete day.shifts[editShift.staffId];save();closeShiftModal();renderSchedule();}

function openStaffModal(id){
  editStaffId=id||null;const s=id?db.staff.find(x=>x.id===id):null;

  document.getElementById('sName').value=s?s.name:'';
  document.getElementById('sRole').value=s?s.role:'홀';
  const curYearWage=(db.settings.minWages||{})[String(new Date().getFullYear())]||10320;
  document.getElementById('sHourly').value=s?s.hourly:curYearWage;
  document.getElementById('minWageHint').textContent=s?'':`${new Date().getFullYear()}년 최저시급 자동 적용됨`;
  document.getElementById('sMonthlySalary').value=s?(s.monthlySalary||0):0;

  document.getElementById('sStatus').value=s?(s.status||'active'):'active';

  fillSel('sDefEnd',s?(s.defEnd||'23:00'):'23:00');
  document.getElementById('sCheckInOnly').checked=s?!!s.checkInOnly:false;
  document.getElementById('sExclude').checked=s?!!s.exclude:false;
  const showSched=s?(s.showInSchedule!==false):true;

  document.getElementById('colorOpts').innerHTML=COLORS.map(c=>`<div class="copt${c===_initColor?' sel':''}" style="background:${c}" data-color="${c}" onclick="selColor(this)"></div>`).join('');

}

async function copyScheduleImage(btn, ov){
  const preview=document.getElementById('scheduleSharePreview');
  if(!btn||!preview){alert('캡처 영역을 찾을 수 없습니다.');return;}
  btn.textContent='⏳ 처리 중...';
  btn.disabled=true;
  await new Promise(r=>setTimeout(r,150));
  try{
    const canvas=await html2canvas(preview,{
      backgroundColor:'#ffffff',
      scale:2,
      useCORS:true,
      logging:false,
      allowTaint:true,
    });
    const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
    const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // Web Share API (가능한 경우)
    const _schedFile=new File([blob],'yoshiya_schedule.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[_schedFile]})){
      btn.textContent='이미지 저장';btn.disabled=false;
      await navigator.share({files:[_schedFile],title:'よしや 야키니쿠 스케줄'});
      return;
    }
    // fallback: 다운로드 (모바일 포함)
    const a=document.createElement('a');
    const now=new Date();
    a.download=`yoshiya_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.png`;
    a.href=URL.createObjectURL(blob);
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    btn.textContent='✅ 저장됨!';
    btn.disabled=false;
    const hint=document.createElement('div');
    hint.style.cssText='color:#fff;font-size:13px;text-align:center;padding:8px 0;font-weight:500;line-height:1.8';
    hint.innerHTML='이미지가 다운로드됐습니다<br>카카오톡 채팅창에서 <strong>📎 파일 첨부</strong>로 전송하세요';
    ov.insertBefore(hint, btn.parentElement);
    setTimeout(()=>{btn.textContent='이미지 저장';},2500);

  }catch(e){
    if(e.name!=='AbortError') alert('오류: '+e.message);
    btn.textContent='이미지 저장';
    btn.disabled=false;
  }
}
